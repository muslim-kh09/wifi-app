name: Android Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # خطوة جديدة لإنشاء الملف الناقص تلقائياً على السيرفر
    - name: Create Missing settings.gradle
      run: echo "include ':app'" > settings.gradle
      working-directory: android_app_project

    - name: Generate Gradle Wrapper on Server
      run: gradle wrapper --gradle-version 8.2
      working-directory: android_app_project

    - name: Build APK
      run: ./gradlew :app:assembleDebug
      working-directory: android_app_project

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android_app_project/app/build/outputs/apk/debug/app-debug.apk
