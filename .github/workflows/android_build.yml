name: Android Build & Release

on:
  push:
    branches: [ main, master ]
    # 1. إضافة مراقبة العلامات (Tags)
    tags:
      - 'v*'

# 2. إعطاء الصلاحية لإنشاء إصدار جديد في المستودع
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source Code ────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Java Runtime ───────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Gradle Toolchain ───────────────────────────────────────────────
      - name: Setup Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # ── 4. Project Scaffolding ─────────────────────────────────────────────
      - name: Create Missing settings.gradle
        run: echo "include ':app'" > settings.gradle
        working-directory: android_app_project

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties
        working-directory: android_app_project

      - name: Create gradle.properties
        run: |
          echo "android.useAndroidX=true"   > gradle.properties
          echo "android.enableJetifier=false" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
        working-directory: android_app_project

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2
        working-directory: android_app_project

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
        working-directory: android_app_project

      - name: Build Signed Release APK
        env:
          KEYSTORE_FILE: "keystore.jks"
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease
        working-directory: android_app_project

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android_app_project/app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android_app_project/app/build/outputs/apk/release/*.apk
